<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kompass-statistikk</title>
<style>
  :root{--bg:#f6f7fb;--card:#fff;--ink:#1c2333;--muted:#5b6478;--line:#e4e7ef;--accent:#3f51b5}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;line-height:1.5;padding:28px 18px 80px}
  .wrap{max-width:680px;margin:0 auto}
  h1{font-size:1.5rem;margin:0 0 4px}
  .sub{color:var(--muted);font-size:.95rem;margin:0 0 24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:16px}
  .total{font-size:2.2rem;font-weight:700;color:var(--accent)}
  table{width:100%;border-collapse:collapse;font-size:.92rem}
  th{text-align:left;padding:6px 8px;border-bottom:2px solid var(--line);font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  td{padding:7px 8px;border-bottom:1px solid var(--line)}
  tr:last-child td{border:0}
  .bar-wrap{background:#eef0f7;border-radius:99px;height:8px;overflow:hidden}
  .bar{height:100%;background:var(--accent);border-radius:99px;transition:width .4s}
  .err{color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:14px;font-size:.92rem}
  label{font-size:.85rem;color:var(--muted);display:block;margin-bottom:4px}
  input{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:.92rem;margin-bottom:12px}
  button{background:var(--accent);color:#fff;border:0;border-radius:10px;padding:10px 20px;font-size:.95rem;font-weight:600;cursor:pointer}
  button:hover{filter:brightness(1.07)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Kompass-statistikk</h1>
  <p class="sub">Anonyme resultater fra politisk kompass-testen</p>

  <div class="card" id="setupCard">
    <label for="urlInput">Worker-URL</label>
    <input id="urlInput" type="url" placeholder="https://kompass-stats.BRUKERNAVN.workers.dev">
    <button onclick="load()">Hent statistikk</button>
  </div>

  <div id="out"></div>
</div>

<script>
const TYPES_NO = {
  WTHG:'Liberal teknolog-optimist', WTHS:'Globalstyrings-entusiast',
  WTDG:'Techno-globalfederalist', WTDS:'Teknopragmatiker',
  WNHG:'Grønn vekst-liberal', WNHS:'Bærekraftig suverenist',
  WNDG:'Solarpunk', WNDS:'Autarki-optimist',
  CTHG:'Oligark-fremtidsoptimist', CTHS:'Teknokratisk statsnasjonstalist',
  CTDG:'Luksuskommunist', CTDS:'Techno-nasjonalist',
  CNHG:'Nasjonalpopulistisk fremtidstro', CNHS:'Tradisjonalistisk nasjonalist',
  CNDG:'Declinistisk nasjonalist', CNDS:'Declinistisk nasjonalist'
};

function load(){
  const base = document.getElementById('urlInput').value.trim().replace(/\/$/,'');
  if(!base){ alert('Fyll inn Worker-URL'); return; }
  localStorage.setItem('statsUrl', base);
  fetch(base+'/stats')
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(render)
    .catch(e=>{ document.getElementById('out').innerHTML = '<div class="err">Feil: '+e.message+'</div>'; });
}

function render(data){
  const rows = Object.entries(data.counts)
    .sort(([,a],[,b]) => b-a);
  const max = rows[0]?.[1] || 1;
  document.getElementById('out').innerHTML =
    '<div class="card"><div class="sub">Totalt antall besvarelser</div>'+
    '<div class="total">'+data.total+'</div></div>'+
    '<div class="card"><table>'+
    '<thead><tr><th>Kode</th><th>Type</th><th>Antall</th><th style="width:140px">Andel</th></tr></thead>'+
    '<tbody>'+rows.map(([code, n]) =>
      '<tr><td><b>'+code+'</b></td>'+
      '<td style="color:#5b6478;font-size:.86rem">'+TYPES_NO[code]+'</td>'+
      '<td>'+n+'</td>'+
      '<td><div class="bar-wrap"><div class="bar" style="width:'+Math.round(n/max*100)+'%"></div></div></td></tr>'
    ).join('')+
    '</tbody></table></div>';
}

const saved = localStorage.getItem('statsUrl');
if(saved){ document.getElementById('urlInput').value = saved; load(); }
</script>
</body>
</html>
